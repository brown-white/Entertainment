<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3E2A1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Entertainment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Playfair+Display:wght@500;600;700&family=Jost:wght@300;400;500;600&family=Nunito:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --espresso:#3E2A1E; --cacao:#6B4A32; --bronze:#B98A5C; --sand:#E8DCC9;
  --bg-light:#F7F2EA; --bg:var(--bg-light);
  --ink-light:#2B1F16; --ink:var(--ink-light);
  --card:#FFFFFF; --muted:#8A7663;
  --ok:#4C7A4C; --warn:#A65A3A; --line:#E4D9C8;
  --font-display:'Cormorant Garamond',serif; --font-body:'Jost',sans-serif;
  --btn-radius:14px; --btn-radius-sm:11px;
  --nav-bg:#FFFFFF; --nav-on:#6B4A32;
  --radius:18px; --shadow:0 6px 24px rgba(62,42,30,.08);
}
[data-theme="dark"]{
  --bg:#1B140E; --card:#271E15; --ink:#F1E8DC; --muted:#B7A48E;
  --line:#3B2F22; --sand:#3B2F22; --shadow:0 6px 24px rgba(0,0,0,.35);
  --nav-bg:#271E15; --nav-on:var(--bronze);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5}
[dir="rtl"] body{font-family:'Tajawal',sans-serif}
h1,h2,h3,.serif{font-family:var(--font-display);font-weight:600;letter-spacing:.01em}
[dir="rtl"] h1,[dir="rtl"] h2,[dir="rtl"] h3,[dir="rtl"] .serif{font-family:'Tajawal',sans-serif;font-weight:700}
button{font-family:inherit;font-size:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;width:100%;background:var(--card);color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--bronze);border-color:var(--bronze)}
input[type="color"]{padding:5px;height:48px;cursor:pointer}
label{font-size:13px;font-weight:500;color:var(--muted);display:block;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.06em}
img{display:block;max-width:100%}
.app{max-width:540px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
.screen{flex:1;padding:20px 18px 100px}
.fadein{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- login ---------- */
.login-wrap{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;color:#F7F2EA;background:
  linear-gradient(180deg,rgba(30,18,10,.20),rgba(30,18,10,.45)),
  radial-gradient(120% 80% at 50% 0%, var(--cacao) 0%, var(--espresso) 72%)}
.login-card{background:var(--card);color:var(--ink);border-radius:24px;padding:22px 20px;box-shadow:var(--shadow);margin-top:20px}
.brandmark{text-align:center}
.brandmark .mono{width:74px;height:74px;margin:0 auto 14px;border:2px solid var(--bronze);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:34px;color:#F1E4D2}
.brandmark h1{font-size:34px;color:#F7F2EA}
.brandmark p{color:#E2D2BD;font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.role-tabs{display:flex;gap:8px;margin-top:18px}
.role-tabs button{flex:1;padding:10px 6px;border-radius:12px;background:rgba(247,242,234,.12);color:#F1E4D2;font-size:14px;font-weight:500}
.role-tabs button.on{background:#F7F2EA;color:var(--espresso);font-weight:600}
.btn{display:block;width:100%;text-align:center;padding:14px;border-radius:var(--btn-radius);background:var(--espresso);color:#F7F2EA;font-weight:600;letter-spacing:.03em;margin-top:18px}
[data-theme="dark"] .btn{background:var(--bronze);color:#1B140E}
.btn.ghost{background:transparent;color:var(--cacao);border:1px solid var(--line);margin-top:10px}
[data-theme="dark"] .btn.ghost{color:var(--bronze)}
.btn.sm{width:auto;display:inline-block;padding:9px 16px;margin-top:0;font-size:14px;border-radius:var(--btn-radius-sm)}
.btn.warn{background:var(--warn);color:#fff}
.hint{font-size:12.5px;color:var(--muted);margin-top:12px;text-align:center}
.err{color:#C4553B;font-size:14px;margin-top:10px;text-align:center;min-height:20px}
.lang-row{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:16px}
.lang-row button{padding:7px 13px;border-radius:999px;border:1px solid rgba(247,242,234,.35);color:#F1E4D2;font-size:13px}
.lang-row button.on{background:#F7F2EA;color:var(--espresso);font-weight:600;border-color:#F7F2EA}
.staff-link{display:block;margin:20px auto 0;text-align:center;font-size:13px;color:#E4D3BC;opacity:.85;letter-spacing:.05em}
.staff-link span{border-bottom:1px dotted #E4D3BC;padding-bottom:2px}

/* ---------- header ---------- */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.top .who{min-width:0}
.top .who h2{font-size:26px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top .who p{font-size:13px;color:var(--muted)}
.iconbtn{width:42px;height:42px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;position:relative}
.toprow{display:flex;gap:8px}
.reddot{position:absolute;top:2px;inset-inline-end:2px;width:10px;height:10px;border-radius:50%;background:#C4553B;border:2px solid var(--bg)}

/* ---------- hero ---------- */
.hero{position:relative;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:22px;background:var(--espresso)}
.hero img{width:100%;height:230px;object-fit:cover;opacity:.85}
.hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(30,18,10,0) 20%,rgba(30,18,10,.86) 82%)}
.hero .tag{position:absolute;top:14px;inset-inline-start:14px;background:rgba(247,242,234,.92);color:#3E2A1E;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:6px 12px;border-radius:999px}
.hero .body{position:absolute;bottom:0;inset-inline:0;padding:16px;color:#F7F2EA}
.hero .body h3{font-size:28px;line-height:1.1}
.hero .meta{display:flex;gap:14px;font-size:13px;color:#E4D3BC;margin-top:4px;flex-wrap:wrap}
.hero .desc{font-size:14px;color:#EFE3D2;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ---------- sections & cards ---------- */
.sec{margin-bottom:22px}
.sec>h3{font-size:22px;margin-bottom:10px;display:flex;align-items:baseline;gap:8px}
.sec>h3 .count{font-family:var(--font-body);font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.act{display:flex;gap:12px;align-items:stretch}
.act .thumb{width:78px;height:78px;border-radius:14px;object-fit:cover;flex:none;background:var(--sand)}
.act .mid{flex:1;min-width:0}
.act .mid h4{font-size:17px;font-weight:600;line-height:1.25}
.act .meta{font-size:13px;color:var(--muted);margin-top:2px}
.act .meta span{margin-inline-end:10px;white-space:nowrap}
.act .side{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex:none;gap:6px}
.chip{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:var(--sand);color:var(--cacao)}
[data-theme="dark"] .chip{color:#E4C9A8}
.chip.ok{background:#E4EEE0;color:var(--ok)}
.chip.full{background:#F3E2D8;color:var(--warn)}
.chip.res{background:#F3ECD8;color:#8A6D2F}
[data-theme="dark"] .chip.ok{background:#25321F;color:#9CC98F}
[data-theme="dark"] .chip.full{background:#3A2418;color:#E0A181}
[data-theme="dark"] .chip.res{background:#3A3018;color:#D9BE7E}
.fav{font-size:20px;line-height:1}
.seats{font-size:12px;color:var(--muted)}
.catbadge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--bronze);font-weight:600}
.quickrow{display:flex;gap:10px;margin-bottom:22px}
.quickrow button{flex:1;background:var(--card);box-shadow:var(--shadow);border-radius:var(--radius);padding:14px 10px;font-size:14px;font-weight:500}
.quickrow button span{display:block;font-size:24px;margin-bottom:4px}

/* ---------- weekly timeline ---------- */
.wk{padding:4px 2px 0}
.wk-item{display:flex;gap:12px;align-items:stretch}
.wk-time{width:52px;flex:none;font-family:var(--font-display);font-size:19px;color:var(--cacao);text-align:end;padding-top:8px}
[data-theme="dark"] .wk-time{color:var(--bronze)}
.wk-rail{width:14px;flex:none;display:flex;flex-direction:column;align-items:center}
.wk-dot{width:10px;height:10px;border-radius:50%;background:var(--bronze);margin-top:14px;flex:none}
.wk-line{flex:1;width:2px;background:var(--line)}
.wk-item:last-child .wk-line{background:transparent}
.wk-info{flex:1;display:flex;gap:12px;align-items:center;min-width:0;padding:8px 0 16px}
.wk-info img{width:56px;height:56px;border-radius:14px;object-fit:cover;flex:none;background:var(--sand)}
.wk-info h4{font-size:16px;font-weight:600;line-height:1.25}
.wk-info p{font-size:13px;color:var(--muted)}

/* ---------- tickets ---------- */
.tk{border-radius:22px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);margin-bottom:16px}
.tk img{width:100%;height:150px;object-fit:cover;background:var(--sand)}
.tk .bd{padding:14px 16px 16px}
.tk h4{font-family:var(--font-display);font-size:24px;font-weight:600}
[dir="rtl"] .tk h4{font-family:'Tajawal',sans-serif}
.tk .mini{margin-top:2px}
.tk .desc{font-size:14px;margin-top:6px}
.tk .rowend{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px}
.tk .price{font-family:var(--font-display);font-size:22px;color:var(--cacao);font-weight:600}
[data-theme="dark"] .tk .price{color:var(--bronze)}

/* ---------- chat ---------- */
.chatlist .card{display:flex;justify-content:space-between;align-items:center;gap:10px}
.chatlist .card .nm{font-weight:600}
.chatlist .card .lastm{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.badge{background:#C4553B;color:#fff;font-size:11px;font-weight:600;border-radius:999px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
.thread{display:flex;flex-direction:column;padding-bottom:66px}
.bub{max-width:80%;padding:10px 14px;border-radius:16px;margin:4px 0;font-size:15px;line-height:1.45;word-break:break-word}
.bub.me{background:var(--espresso);color:#F7F2EA;margin-inline-start:auto;border-end-end-radius:4px}
[data-theme="dark"] .bub.me{background:var(--bronze);color:#1B140E}
.bub.them{background:var(--card);box-shadow:var(--shadow);border-end-start-radius:4px}
.bub .tm{display:block;font-size:10.5px;opacity:.65;margin-top:3px}
.chatbar{position:fixed;bottom:calc(62px + env(safe-area-inset-bottom));inset-inline:0;max-width:540px;margin:0 auto;display:flex;gap:8px;padding:10px 14px;background:var(--bg);z-index:35}
.chatbar input{flex:1}
.chatbar button{flex:none;width:50px;height:50px;border-radius:50%;background:var(--espresso);color:#F7F2EA;font-size:19px}
[data-theme="dark"] .chatbar button{background:var(--bronze);color:#1B140E}

/* ---------- pills / sub-tabs / day tabs ---------- */
.daytabs,.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.daytabs::-webkit-scrollbar,.pills::-webkit-scrollbar{display:none}
.daytabs button,.pills button{flex:none;padding:9px 15px;border-radius:999px;background:var(--card);box-shadow:var(--shadow);font-size:14px;font-weight:500;color:var(--muted)}
.daytabs button.on,.pills button.on{background:var(--espresso);color:#F7F2EA;font-weight:600}
[data-theme="dark"] .daytabs button.on,[data-theme="dark"] .pills button.on{background:var(--bronze);color:#1B140E}

/* ---------- bottom nav ---------- */
.nav{position:fixed;bottom:0;inset-inline:0;max-width:540px;margin:0 auto;background:var(--nav-bg);border-top:1px solid var(--line);display:flex;padding:8px 4px calc(10px + env(safe-area-inset-bottom));z-index:40}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:500;color:var(--muted);padding:4px 1px;min-width:0;position:relative}
.nav button span.lb{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.nav button .ic{font-size:22px;line-height:1}
.nav button.on{color:var(--nav-on)}
.nav .ndot{position:absolute;top:2px;inset-inline-end:16%;width:9px;height:9px;border-radius:50%;background:#C4553B}

/* ---------- modal / toast ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(30,18,10,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);width:100%;max-width:540px;border-radius:24px 24px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto;animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-size:24px;margin-bottom:6px}
.modal .grab{width:44px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 14px}
.row2{display:flex;gap:10px}
.row2>*{flex:1}
.toast{position:fixed;bottom:92px;inset-inline:0;display:flex;justify-content:center;z-index:80;pointer-events:none}
.toast span{background:var(--espresso);color:#F7F2EA;padding:11px 20px;border-radius:999px;font-size:14px;box-shadow:var(--shadow);animation:fade .2s ease}
[data-theme="dark"] .toast span{background:var(--bronze);color:#1B140E}
.langlist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.langlist button{padding:12px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);font-size:15px}
.langlist button.on{outline:2px solid var(--bronze);font-weight:600}

/* ---------- manager ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.stat b{font-family:var(--font-display);font-size:32px;font-weight:600;display:block;line-height:1}
[dir="rtl"] .stat b{font-family:'Tajawal',sans-serif}
.stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.mini{font-size:13px;color:var(--muted)}
.booking-line{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;gap:8px}
.booking-line:last-child{border-bottom:none}
.pill{font-size:12px;background:var(--sand);color:var(--cacao);border-radius:999px;padding:3px 10px;white-space:nowrap}
[data-theme="dark"] .pill{color:#E4C9A8}
.empty{padding:34px 16px;text-align:center;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:8px}
.setup{background:#FDF6E7;border:1px solid #E8D9B5;color:#7A5C22;border-radius:14px;padding:12px 14px;font-size:13.5px;margin-bottom:16px}
[data-theme="dark"] .setup{background:#33290F;border-color:#5A4A1E;color:#E3CE96}
.roomgrid{max-height:340px;overflow-y:auto}
</style>
</head>

/* ---------------- data layer ---------------- */
async function sb(path, opts={}){
  const res = await fetch(CONFIG.SUPABASE_URL + "/rest/v1/" + path, {
    ...opts,
    headers:{
      "apikey":CONFIG.SUPABASE_ANON_KEY,
      "Authorization":"Bearer "+CONFIG.SUPABASE_ANON_KEY,
      "Content-Type":"application/json",
      "Prefer": opts.method==="POST"||opts.method==="PATCH" ? "return=representation" : "",
      ...(opts.headers||{})
    }
  });
  if(!res.ok) throw new Error("Supabase "+res.status+" on "+path);
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

function shade(hex,p){
  const n=parseInt(hex.slice(1),16); let r=n>>16,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r+(255-r)*p)); g=Math.min(255,Math.round(g+(255-g)*p)); b=Math.min(255,Math.round(b+(255-b)*p));
  return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");
}
function applySettings(){
  const st=S.settings, root=document.documentElement.style;
  root.setProperty("--espresso",st.primary);

  root.setProperty("--bg-light",st.bg||"#F7F2EA");

  if(S.theme==="light"){
    root.setProperty("--nav-bg",st.navBg||"#FFFFFF");
    root.setProperty("--nav-on",st.navActive||shade(st.primary,.22));
  } else { root.removeProperty("--nav-bg"); root.removeProperty("--nav-on"); }
  const f=FONTS[st.fontStyle]||FONTS.elegant;
  root.setProperty("--font-display",f[0]); root.setProperty("--font-body",f[1]);
  const br=BTN_R[st.buttonStyle]||BTN_R.rounded;
  root.setProperty("--btn-radius",br[0]); root.setProperty("--btn-radius-sm",br[1]);

function reviewDue(g){
  if(!g || !g.arrival || !g.departure) return false;
  const a=Date.parse(g.arrival), d=Date.parse(g.departure);
  if(isNaN(a)||isNaN(d)||d<a) return false;
  return Date.now() >= a+(d-a)/2;
}

      <label>${t("pass")}</label><input id="f-pass" type="password" placeholder="••••">
      <button class="btn" id="btn-login">${t("signin")}</button>
      <div class="err" id="login-err"></div>
      ${!REMOTE?`<p class="hint">${t("demoNote")}<br>Demo: manager / 1234 · team / 1234</p>`:""}
    </div>

function wireLogin(){
  document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
  document.querySelectorAll("[data-role]").forEach(b=>b.onclick=()=>{loginRole=b.dataset.role;render();});
  const tl=$("#btn-teamlink"); if(tl) tl.onclick=()=>{loginMode="team";render();};
  const gl=$("#btn-guestlink"); if(gl) gl.onclick=()=>{loginMode="guest";render();};
  $("#btn-login").onclick=async ()=>{
    const err=$("#login-err");
    if(loginMode==="guest"){
      const room=$("#f-room").value.trim(), name=$("#f-name").value.trim(), phone=$("#f-phone").value.trim();
      const nat=$("#f-nat").value.trim(), arr=$("#f-arr").value, dep=$("#f-dep").value;
      if(!room||!name){ err.textContent=t("loginErr"); return; }
      const rm=S.rooms.find(x=>String(x.room)===room);
      if(!rm || !rm.active){ err.textContent=t("roomNotFound"); return; }
      let acc=S.accounts.find(a=>String(a.room)===room);
      if(!acc){
        if(!nat||!arr||!dep||Date.parse(dep)<Date.parse(arr)){ err.textContent=t("loginErr"); return; }
        try{ acc=await DB.addAccount({room,name,phone,nationality:nat,arrival:arr,departure:dep}); }
        catch(e){ err.textContent=t("loginErr"); return; }
      }
      S.session={role:"guest",room:acc.room,name:acc.name,phone:acc.phone||"",
        nationality:acc.nationality||"",arrival:acc.arrival,departure:acc.departure};
      S.tab="home"; persist(); render();
    } else {
      const u=$("#f-user").value.trim(), p=$("#f-pass").value;
      const found=S.users.find(x=>x.username===u && x.password===p && (loginRole==="manager"?x.role==="manager":true));
      if(!found){ err.textContent=t("loginErr"); return; }
      const role = found.role==="manager" && loginRole==="manager" ? "manager" : "staff";
      S.session={role,name:found.display_name||found.username,username:found.username,userId:found.id};
      S.tab = role==="manager" ? "dash" : "today"; persist(); render();
    }
  };
}

function baseModal(html){
  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal"><div class="grab"></div>${html}</div>`;
  document.body.appendChild(wrap);
  wrap.onclick=e=>{ if(e.target===wrap) wrap.remove(); };
  return wrap;
}

    <label>${t("desc")}</label><textarea id="k-desc" rows="2">${esc(tk.desc)}</textarea>
    <div class="row2">
      <div><label>${t("day")}</label><select id="k-day">${t("days").map((d,i)=>`<option value="${i}" ${tk.day===i?"selected":""}>${d}</option>`).join("")}</select></div>
      <div><label>${t("time")}</label><input id="k-time" type="time" value="${esc(tk.time)}"></div>
    </div>
    <div class="row2">
      <div><label>${t("price")}</label><input id="k-price" value="${esc(tk.price)}" placeholder="5 €"></div>
      <div><label>${t("capacity")} (0 = ∞)</label><input id="k-cap" type="number" min="0" value="${tk.capacity}"></div>
    </div>
    <label>${t("location")}</label><input id="k-loc" value="${esc(tk.location)}">
    <label>${t("imageUrl")}</label><input id="k-img" value="${esc(tk.image)}" placeholder="https://...">
    <button class="btn" id="k-save">${t("save")}</button>
    ${isNew?"":`<button class="btn warn" id="k-del">${t("deleteActivity")}</button>`}
    <button class="btn ghost" id="k-x">${t("close")}</button>`);
  wrap.querySelector("#k-x").onclick=()=>wrap.remove();
  wrap.querySelector("#k-save").onclick=async ()=>{
    const upd={...tk,
      name:wrap.querySelector("#k-name").value.trim(),
      desc:wrap.querySelector("#k-desc").value.trim(),
      day:+wrap.querySelector("#k-day").value,
      time:wrap.querySelector("#k-time").value||"20:00",
      price:wrap.querySelector("#k-price").value.trim(),
      capacity:+wrap.querySelector("#k-cap").value||0,
      location:wrap.querySelector("#k-loc").value.trim(),
      image:wrap.querySelector("#k-img").value.trim()};
    if(!upd.name) return;
    await DB.saveTicket(upd); wrap.remove(); toast(t("saved")); render();
  };
  const del=wrap.querySelector("#k-del");
  if(del) del.onclick=async ()=>{ await DB.deleteTicket(tk.id); wrap.remove(); toast(t("deleted")); render(); };
}

      <div><label>${t("day")}</label><select id="e-day">${t("days").map((d,i)=>`<option value="${i}" ${a.day===i?"selected":""}>${d}</option>`).join("")}</select></div>
      <div><label>${t("category")}</label><select id="e-cat">${CAT_ORDER.map(c=>`<option value="${c}" ${a.category===c?"selected":""}>${catLabel(c)}</option>`).join("")}</select></div>

  wrap.querySelector("#e-x").onclick=()=>wrap.remove();
  wrap.querySelector("#e-save").onclick=async ()=>{

function openUserModal(){
  const wrap=baseModal(`
    <h3>${t("addUser")}</h3>
    <label>${t("user")}</label><input id="u-name" autocapitalize="none">
    <label>${t("pass")}</label><input id="u-pass">
    <label>${t("displayName")}</label><input id="u-disp">
    <label>${t("roleLabel")}</label>
    <select id="u-role"><option value="staff">${t("staff")}</option><option value="manager">${t("manager")}</option></select>
    <button class="btn" id="u-save">${t("save")}</button>
    <div class="err" id="u-err"></div>
    <button class="btn ghost" id="u-x">${t("close")}</button>`);
  wrap.querySelector("#u-x").onclick=()=>wrap.remove();
  wrap.querySelector("#u-save").onclick=async ()=>{
    const username=wrap.querySelector("#u-name").value.trim();
    const password=wrap.querySelector("#u-pass").value;
    const display_name=wrap.querySelector("#u-disp").value.trim();
    const role=wrap.querySelector("#u-role").value;
    const err=wrap.querySelector("#u-err");
    if(!username||!password){ err.textContent=t("loginErr"); return; }
    if(S.users.some(x=>x.username===username)){ err.textContent=t("userExists"); return; }
    await DB.addUser({username,password,role,display_name});
    wrap.remove(); toast(t("saved")); render();
  };
}
function openLangModal(){
  const wrap=baseModal(`
    <h3>${t("language")}</h3>
    <div class="langlist">
      ${LANGS.map(([l,label])=>`<button data-mlang="${l}" class="${S.lang===l?"on":""}">${label}</button>`).join("")}
    </div>
    <button class="btn ghost" id="l-x">${t("close")}</button>`);
  wrap.querySelector("#l-x").onclick=()=>wrap.remove();
  wrap.querySelectorAll("[data-mlang]").forEach(b=>b.onclick=()=>{ wrap.remove(); setLang(b.dataset.mlang); });

/* ---------------- wiring ---------------- */
function wireCommon(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;S.chatRoom=null;render();});
  document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{S.day=+b.dataset.day;render();});
  document.querySelectorAll("[data-sub]").forEach(b=>b.onclick=()=>{
    const [g,v]=b.dataset.sub.split(":"); S.sub[g]=v; S.chatRoom=null; render();
  });
  const th=$("#btn-theme"); if(th) th.onclick=()=>setTheme(S.theme==="light"?"dark":"light");
  const lg=$("#btn-lang"); if(lg) lg.onclick=openLangModal;
  const nb=$("#btn-notes"); if(nb) nb.onclick=openNotesModal;
  const out=$("#btn-out"); if(out) out.onclick=()=>{S.session=null;S.chatRoom=null;loginMode="guest";persist();render();};
  document.querySelectorAll("[data-fav]").forEach(b=>b.onclick=e=>{
    e.stopPropagation(); const id=+b.dataset.fav;
    S.favorites=S.favorites.includes(id)?S.favorites.filter(x=>x!==id):[...S.favorites,id]; persist(); render();
  });
  document.querySelectorAll("[data-book]").forEach(b=>b.onclick=e=>{
    e.stopPropagation(); const a=S.activities.find(x=>x.id===+b.dataset.book); if(a) openBookModal(a);
  });
  document.querySelectorAll("[data-buy]").forEach(b=>b.onclick=e=>{
    e.stopPropagation(); const tk=S.tickets.find(x=>x.id===+b.dataset.buy); if(tk) openTicketBuyModal(tk);
  });
  document.querySelectorAll("[data-cancel]").forEach(b=>b.onclick=async e=>{
    e.stopPropagation(); await DB.removeBooking(+b.dataset.cancel); toast(t("cancelled")); render();
  });
  document.querySelectorAll("[data-cancelorder]").forEach(b=>b.onclick=async e=>{
    e.stopPropagation(); await DB.deleteOrder(+b.dataset.cancelorder); toast(t("cancelled")); render();
  });
  document.querySelectorAll("[data-delreq]").forEach(b=>b.onclick=async ()=>{
    await DB.deleteRequest(+b.dataset.delreq); toast(t("deleted")); render();
  });
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=e=>{
    e.stopPropagation(); const a=S.activities.find(x=>x.id===+b.dataset.edit); openEditModal(a);
  });
  document.querySelectorAll("[data-att]").forEach(b=>b.onclick=e=>{
    e.stopPropagation(); const a=S.activities.find(x=>x.id===+b.dataset.att); if(a) openAttendanceModal(a);
  });
  document.querySelectorAll("[data-tedit]").forEach(b=>b.onclick=e=>{
    e.stopPropagation(); const tk=S.tickets.find(x=>x.id===+b.dataset.tedit); openTicketEditModal(tk);
  });
  document.querySelectorAll("[data-tpaid]").forEach(b=>b.onclick=async ()=>{
    const o=S.orders.find(x=>x.id===+b.dataset.tpaid); if(!o) return;
    await DB.setOrderStatus(o.id, o.status==="paid"?"reserved":"paid"); render();
  });
  document.querySelectorAll("[data-tdel]").forEach(b=>b.onclick=async ()=>{
    await DB.deleteOrder(+b.dataset.tdel); toast(t("deleted")); render();
  });
  document.querySelectorAll("[data-deluser]").forEach(b=>b.onclick=async ()=>{
    await DB.deleteUser(+b.dataset.deluser); toast(t("deleted")); render();
  });
  document.querySelectorAll("[data-reqdone]").forEach(b=>b.onclick=async ()=>{
    const r=S.requests.find(x=>x.id===+b.dataset.reqdone); if(!r) return;
    await DB.setRequestStatus(r.id, r.status==="done"?"new":"done"); render();
  });
  document.querySelectorAll("[data-reqdel]").forEach(b=>b.onclick=async ()=>{
    await DB.deleteRequest(+b.dataset.reqdel); toast(t("deleted")); render();
  });
  document.querySelectorAll("[data-taskdone]").forEach(b=>b.onclick=async ()=>{
    const x=S.tasks.find(y=>y.id===+b.dataset.taskdone); if(!x) return;
    await DB.setTaskStatus(x.id, x.status==="done"?"open":"done"); render();
  });
  document.querySelectorAll("[data-taskdel]").forEach(b=>b.onclick=async ()=>{
    await DB.deleteTask(+b.dataset.taskdel); toast(t("deleted")); render();
  });
  document.querySelectorAll("[data-roomact]").forEach(b=>b.onclick=async ()=>{
    const r=S.rooms.find(x=>x.id==b.dataset.roomact); if(!r) return;
    await DB.setRoomActive(r.id,!r.active); render();
  });
  document.querySelectorAll("[data-roomdel]").forEach(b=>b.onclick=async ()=>{
    await DB.deleteRoom(+b.dataset.roomdel||b.dataset.roomdel); toast(t("deleted")); render();
  });
  document.querySelectorAll("[data-chatroom]").forEach(el=>el.onclick=()=>{
    S.chatRoom=el.dataset.chatroom; render();
  });
  const cb=$("#btn-chatback"); if(cb) cb.onclick=()=>{S.chatRoom=null;render();};
  const add=$("#btn-add"); if(add) add.onclick=()=>openEditModal(null);
  const addT=$("#btn-addticket"); if(addT) addT.onclick=()=>openTicketEditModal(null);
  const addU=$("#btn-adduser"); if(addU) addU.onclick=openUserModal;
  const addTk=$("#btn-addtask"); if(addTk) addTk.onclick=openTaskModal;
  const rs=$("#btn-req-song"); if(rs) rs.onclick=()=>openRequestModal("song");
  const rb=$("#btn-req-bday"); if(rb) rb.onclick=()=>openRequestModal("birthday");
  const ar=$("#btn-addrooms"); if(ar) ar.onclick=async ()=>{
    const raw=$("#rooms-in").value;
    const list=[...new Set(raw.split(/[\n,;]+/).map(x=>x.trim()).filter(Boolean))];
    if(!list.length) return;
    await DB.addRooms(list); toast(t("saved")); render();
  };
  const rf=$("#rooms-filter"); if(rf) rf.oninput=()=>{
    const q=rf.value.trim().toLowerCase();
    document.querySelectorAll(".roomline").forEach(el=>{
      el.style.display = !q || el.dataset.room.toLowerCase().includes(q) || el.textContent.toLowerCase().includes(q) ? "" : "none";
    });
  };
  const sv=$("#btn-savesettings"); if(sv) sv.onclick=async ()=>{
    const st={...S.settings,
      name:$("#s-name").value.trim()||"Entertainment",
      subtitle:$("#s-sub").value.trim(),
      welcomeMsg:$("#s-welcome").value.trim(),
      primary:$("#s-primary").value, accent:$("#s-accent").value, bg:$("#s-bg").value,
      textColor:$("#s-text").value, navBg:$("#s-navbg").value, navActive:$("#s-navon").value,
      fontStyle:$("#s-font").value, buttonStyle:$("#s-btn").value,
      menuHome:$("#s-mhome").value.trim(), menuProgram:$("#s-mprog").value.trim(),
      menuTickets:$("#s-mtick").value.trim(), menuChat:$("#s-mchat").value.trim(), menuStay:$("#s-mstay").value.trim(),
      tripadvisor:$("#s-trip").value.trim(), google:$("#s-goog").value.trim(), holidaycheck:$("#s-holi").value.trim(),
      instagram:$("#s-insta").value.trim(), tiktok:$("#s-tiktok").value.trim(),
      facebook:$("#s-fb").value.trim(), youtube:$("#s-yt").value.trim()};
    await DB.saveSettings(st); applySettings(); toast(t("saved")); render();
  };
  document.querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>{
    if(!S.session || S.session.role!=="guest") return;
    const a=S.activities.find(x=>x.id===+el.dataset.open);
    if(a && !myBooking(a.id)) openBookModal(a);
  });
  /* chat send + read marking + scroll */
  const cs=$("#chat-send");
  if(cs){
    const g=S.session;
    const room = g.role==="guest" ? g.room : S.chatRoom;
    const meSide = g.role==="guest" ? "guest" : "team";
    const readSide = g.role==="guest" ? "guest" : "team";
    if(room){
      const flag = readSide==="team"?"read_by_team":"read_by_guest";
      const sender = readSide==="team"?"guest":"team";
      if(S.messages.some(m=>m.room===room&&m.sender===sender&&!m[flag])){
        DB.markRead(room,readSide).then(()=>render());
      }
      window.scrollTo(0,document.body.scrollHeight);
      const doSend=async ()=>{
        const inp=$("#chat-in"); const txt=inp.value.trim(); if(!txt) return;
        inp.value="";
        await DB.addMessage({room,sender:meSide,sender_name:g.name,text:txt,
          read_by_team:meSide==="team",read_by_guest:meSide==="guest"});
        render();
      };
      cs.onclick=doSend;
      $("#chat-in").onkeydown=e=>{ if(e.key==="Enter") doSend(); };
    }
  }
}

/* ---------------- boot ---------------- */
function safeToRender(){
  if(document.querySelector(".modal-bg")) return false;
  const a=document.activeElement;
  return !(a && ["INPUT","TEXTAREA","SELECT"].includes(a.tagName));
}
(async function(){
  restore();
  document.documentElement.setAttribute("data-theme",S.theme);
  document.documentElement.lang=S.lang;
  document.documentElement.dir=(S.lang==="ar"?"rtl":"ltr");
  try{ await DB.load(); }
  catch(e){
    console.error(e);
    if(REMOTE){ S.loadError=true; applySettings(); render(); return; }
    S.activities=demoActivities(); S.bookings=demoBookings();
    S.users=DEMO_USERS.map(u=>({...u})); S.tickets=demoTickets(); S.orders=demoOrders();
    S.rooms=demoRooms(); S.accounts=demoAccounts(); S.messages=demoMessages();
    S.requests=demoRequests(); S.tasks=demoTasks(); S.notes=demoNotes(); S.attendance=[];
  }
  /* validate remembered session against fresh data */
  if(S.session){
    if(S.session.role==="guest"){
      const rm=S.rooms.find(x=>String(x.room)===String(S.session.room));
      const acc=S.accounts.find(a=>String(a.room)===String(S.session.room));
      if(!rm || !rm.active || !acc) S.session=null;
      else S.session={role:"guest",room:acc.room,name:acc.name,phone:acc.phone||"",
        nationality:acc.nationality||"",arrival:acc.arrival,departure:acc.departure};
    } else {
      const u=S.users.find(x=>x.username===S.session.username);
      if(!u || (S.session.role==="manager" && u.role!=="manager")) S.session=null;
      else S.session={...S.session,name:u.display_name||u.username,userId:u.id};
    }
    if(!S.session){ S.tab="home"; }
    persist();
  }
  applySettings();
  render();
  if(REMOTE) setInterval(async ()=>{
    if(!S.session) return;
    try{ const changed=await DB.poll(); if(changed && safeToRender()) render(); }catch(e){}
  }, 45000);
})();
</script>
