<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3E2A1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Entertainment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Playfair+Display:wght@500;600;700&family=Jost:wght@300;400;500;600&family=Nunito:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --espresso:#3E2A1E; --cacao:#6B4A32; --bronze:#B98A5C; --sand:#E8DCC9;
  --bg-light:#F7F2EA; --bg:var(--bg-light);
  --ink-light:#2B1F16; --ink:var(--ink-light);
  --card:#FFFFFF; --muted:#8A7663;
  --ok:#4C7A4C; --warn:#A65A3A; --line:#E4D9C8;
  --font-display:'Cormorant Garamond',serif; --font-body:'Jost',sans-serif;
  --btn-radius:14px; --btn-radius-sm:11px;
  --nav-bg:#FFFFFF; --nav-on:#6B4A32;
  --radius:18px; --shadow:0 6px 24px rgba(62,42,30,.08);
}
[data-theme="dark"]{
  --bg:#1B140E; --card:#271E15; --ink:#F1E8DC; --muted:#B7A48E;
  --line:#3B2F22; --sand:#3B2F22; --shadow:0 6px 24px rgba(0,0,0,.35);
  --nav-bg:#271E15; --nav-on:var(--bronze);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5}
[dir="rtl"] body{font-family:'Tajawal',sans-serif}
h1,h2,h3,.serif{font-family:var(--font-display);font-weight:600;letter-spacing:.01em}
[dir="rtl"] h1,[dir="rtl"] h2,[dir="rtl"] h3,[dir="rtl"] .serif{font-family:'Tajawal',sans-serif;font-weight:700}
button{font-family:inherit;font-size:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;width:100%;background:var(--card);color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--bronze);border-color:var(--bronze)}
input[type="color"]{padding:5px;height:48px;cursor:pointer}
label{font-size:13px;font-weight:500;color:var(--muted);display:block;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.06em}
img{display:block;max-width:100%}
.app{max-width:540px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
.screen{flex:1;padding:20px 18px 100px}
.fadein{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- login ---------- */
.login-wrap{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;color:#F7F2EA;background:
  linear-gradient(180deg,rgba(30,18,10,.20),rgba(30,18,10,.45)),
  radial-gradient(120% 80% at 50% 0%, var(--cacao) 0%, var(--espresso) 72%)}
.login-card{background:var(--card);color:var(--ink);border-radius:24px;padding:22px 20px;box-shadow:var(--shadow);margin-top:20px}
.brandmark{text-align:center}
.brandmark .mono{width:74px;height:74px;margin:0 auto 14px;border:2px solid var(--bronze);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:34px;color:#F1E4D2}
.brandmark h1{font-size:34px;color:#F7F2EA}
.brandmark p{color:#E2D2BD;font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.role-tabs{display:flex;gap:8px;margin-top:18px}
.role-tabs button{flex:1;padding:10px 6px;border-radius:12px;background:rgba(247,242,234,.12);color:#F1E4D2;font-size:14px;font-weight:500}
.role-tabs button.on{background:#F7F2EA;color:var(--espresso);font-weight:600}
.btn{display:block;width:100%;text-align:center;padding:14px;border-radius:var(--btn-radius);background:var(--espresso);color:#F7F2EA;font-weight:600;letter-spacing:.03em;margin-top:18px}
[data-theme="dark"] .btn{background:var(--bronze);color:#1B140E}
.btn.ghost{background:transparent;color:var(--cacao);border:1px solid var(--line);margin-top:10px}
[data-theme="dark"] .btn.ghost{color:var(--bronze)}
.btn.sm{width:auto;display:inline-block;padding:9px 16px;margin-top:0;font-size:14px;border-radius:var(--btn-radius-sm)}
.btn.warn{background:var(--warn);color:#fff}
.hint{font-size:12.5px;color:var(--muted);margin-top:12px;text-align:center}
.err{color:#C4553B;font-size:14px;margin-top:10px;text-align:center;min-height:20px}
.lang-row{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:16px}
.lang-row button{padding:7px 13px;border-radius:999px;border:1px solid rgba(247,242,234,.35);color:#F1E4D2;font-size:13px}
.lang-row button.on{background:#F7F2EA;color:var(--espresso);font-weight:600;border-color:#F7F2EA}
.staff-link{display:block;margin:20px auto 0;text-align:center;font-size:13px;color:#E4D3BC;opacity:.85;letter-spacing:.05em}
.staff-link span{border-bottom:1px dotted #E4D3BC;padding-bottom:2px}

/* ---------- header ---------- */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.top .who{min-width:0}
.top .who h2{font-size:26px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top .who p{font-size:13px;color:var(--muted)}
.iconbtn{width:42px;height:42px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;position:relative}
.toprow{display:flex;gap:8px}
.reddot{position:absolute;top:2px;inset-inline-end:2px;width:10px;height:10px;border-radius:50%;background:#C4553B;border:2px solid var(--bg)}

/* ---------- hero ---------- */
.hero{position:relative;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:22px;background:var(--espresso)}
.hero img{width:100%;height:230px;object-fit:cover;opacity:.85}
.hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(30,18,10,0) 20%,rgba(30,18,10,.86) 82%)}
.hero .tag{position:absolute;top:14px;inset-inline-start:14px;background:rgba(247,242,234,.92);color:#3E2A1E;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:6px 12px;border-radius:999px}
.hero .body{position:absolute;bottom:0;inset-inline:0;padding:16px;color:#F7F2EA}
.hero .body h3{font-size:28px;line-height:1.1}
.hero .meta{display:flex;gap:14px;font-size:13px;color:#E4D3BC;margin-top:4px;flex-wrap:wrap}
.hero .desc{font-size:14px;color:#EFE3D2;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ---------- sections & cards ---------- */
.sec{margin-bottom:22px}
.sec>h3{font-size:22px;margin-bottom:10px;display:flex;align-items:baseline;gap:8px}
.sec>h3 .count{font-family:var(--font-body);font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.act{display:flex;gap:12px;align-items:stretch}
.act .thumb{width:78px;height:78px;border-radius:14px;object-fit:cover;flex:none;background:var(--sand)}
.act .mid{flex:1;min-width:0}
.act .mid h4{font-size:17px;font-weight:600;line-height:1.25}
.act .meta{font-size:13px;color:var(--muted);margin-top:2px}
.act .meta span{margin-inline-end:10px;white-space:nowrap}
.act .side{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex:none;gap:6px}
.chip{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:var(--sand);color:var(--cacao)}
[data-theme="dark"] .chip{color:#E4C9A8}
.chip.ok{background:#E4EEE0;color:var(--ok)}
.chip.full{background:#F3E2D8;color:var(--warn)}
.chip.res{background:#F3ECD8;color:#8A6D2F}
[data-theme="dark"] .chip.ok{background:#25321F;color:#9CC98F}
[data-theme="dark"] .chip.full{background:#3A2418;color:#E0A181}
[data-theme="dark"] .chip.res{background:#3A3018;color:#D9BE7E}
.fav{font-size:20px;line-height:1}
.seats{font-size:12px;color:var(--muted)}
.catbadge{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--bronze);font-weight:600}
.quickrow{display:flex;gap:10px;margin-bottom:22px}
.quickrow button{flex:1;background:var(--card);box-shadow:var(--shadow);border-radius:var(--radius);padding:14px 10px;font-size:14px;font-weight:500}
.quickrow button span{display:block;font-size:24px;margin-bottom:4px}

/* ---------- weekly timeline ---------- */
.wk{padding:4px 2px 0}
.wk-item{display:flex;gap:12px;align-items:stretch}
.wk-time{width:56px;flex:none;font-family:var(--font-display);font-size:18px;color:var(--cacao);text-align:end;padding-top:8px;line-height:1.15}
.wk-time .wk-end{display:block;font-family:var(--font-body);font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap}
[data-theme="dark"] .wk-time{color:var(--bronze)}
.wk-rail{width:14px;flex:none;display:flex;flex-direction:column;align-items:center}
.wk-dot{width:10px;height:10px;border-radius:50%;background:var(--bronze);margin-top:14px;flex:none}
.wk-line{flex:1;width:2px;background:var(--line)}
.wk-item:last-child .wk-line{background:transparent}
.wk-info{flex:1;display:flex;gap:12px;align-items:center;min-width:0;padding:8px 0 16px}
.wk-info img{width:56px;height:56px;border-radius:14px;object-fit:cover;flex:none;background:var(--sand)}
.wk-info h4{font-size:16px;font-weight:600;line-height:1.25}
.wk-info p{font-size:13px;color:var(--muted)}

/* ---------- tickets ---------- */
.tk{border-radius:22px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);margin-bottom:16px}
.tk img{width:100%;height:150px;object-fit:cover;background:var(--sand)}
.tk .bd{padding:14px 16px 16px}
.tk h4{font-family:var(--font-display);font-size:24px;font-weight:600}
[dir="rtl"] .tk h4{font-family:'Tajawal',sans-serif}
.tk .mini{margin-top:2px}
.tk .desc{font-size:14px;margin-top:6px}
.tk .rowend{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px}
.tk .price{font-family:var(--font-display);font-size:22px;color:var(--cacao);font-weight:600}
[data-theme="dark"] .tk .price{color:var(--bronze)}

/* ---------- chat ---------- */
.chatlist .card{display:flex;justify-content:space-between;align-items:center;gap:10px}
.chatlist .card .nm{font-weight:600}
.chatlist .card .lastm{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.badge{background:#C4553B;color:#fff;font-size:11px;font-weight:600;border-radius:999px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
.thread{display:flex;flex-direction:column;padding-bottom:66px}
.bub{max-width:80%;padding:10px 14px;border-radius:16px;margin:4px 0;font-size:15px;line-height:1.45;word-break:break-word}
.bub.me{background:var(--espresso);color:#F7F2EA;margin-inline-start:auto;border-end-end-radius:4px}
[data-theme="dark"] .bub.me{background:var(--bronze);color:#1B140E}
.bub.them{background:var(--card);box-shadow:var(--shadow);border-end-start-radius:4px}
.bub .tm{display:block;font-size:10.5px;opacity:.65;margin-top:3px}
.chatbar{position:fixed;bottom:calc(62px + env(safe-area-inset-bottom));inset-inline:0;max-width:540px;margin:0 auto;display:flex;gap:8px;padding:10px 14px;background:var(--bg);z-index:35}
.chatbar input{flex:1}
.chatbar button{flex:none;width:50px;height:50px;border-radius:50%;background:var(--espresso);color:#F7F2EA;font-size:19px}
[data-theme="dark"] .chatbar button{background:var(--bronze);color:#1B140E}

/* ---------- pills / sub-tabs / day tabs ---------- */
.daytabs,.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.daytabs::-webkit-scrollbar,.pills::-webkit-scrollbar{display:none}
.daytabs button,.pills button{flex:none;padding:9px 15px;border-radius:999px;background:var(--card);box-shadow:var(--shadow);font-size:14px;font-weight:500;color:var(--muted)}
.daytabs button.on,.pills button.on{background:var(--espresso);color:#F7F2EA;font-weight:600}
[data-theme="dark"] .daytabs button.on,[data-theme="dark"] .pills button.on{background:var(--bronze);color:#1B140E}

/* ---------- bottom nav ---------- */
.nav{position:fixed;bottom:0;inset-inline:0;max-width:540px;margin:0 auto;background:var(--nav-bg);border-top:1px solid var(--line);display:flex;padding:8px 4px calc(10px + env(safe-area-inset-bottom));z-index:40}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:500;color:var(--muted);padding:4px 1px;min-width:0;position:relative}
.nav button span.lb{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.nav button .ic{font-size:22px;line-height:1}
.nav button.on{color:var(--nav-on)}
.nav .ndot{position:absolute;top:2px;inset-inline-end:16%;width:9px;height:9px;border-radius:50%;background:#C4553B}

/* ---------- modal / toast ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(30,18,10,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);width:100%;max-width:540px;border-radius:24px 24px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));max-height:88dvh;overflow-y:auto;animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-size:24px;margin-bottom:6px}
.modal .grab{width:44px;height:5px;border-radius:99px;background:var(--line);margin:0 auto 14px}
.row2{display:flex;gap:10px}
.row2>*{flex:1}
.toast{position:fixed;bottom:92px;inset-inline:0;display:flex;justify-content:center;z-index:80;pointer-events:none}
.toast span{background:var(--espresso);color:#F7F2EA;padding:11px 20px;border-radius:999px;font-size:14px;box-shadow:var(--shadow);animation:fade .2s ease}
[data-theme="dark"] .toast span{background:var(--bronze);color:#1B140E}
.langlist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.langlist button{padding:12px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);font-size:15px}
.langlist button.on{outline:2px solid var(--bronze);font-weight:600}

/* ---------- manager ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.stat b{font-family:var(--font-display);font-size:32px;font-weight:600;display:block;line-height:1}
[dir="rtl"] .stat b{font-family:'Tajawal',sans-serif}
.stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.mini{font-size:13px;color:var(--muted)}
.booking-line{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;gap:8px}
.booking-line:last-child{border-bottom:none}
.pill{font-size:12px;background:var(--sand);color:var(--cacao);border-radius:999px;padding:3px 10px;white-space:nowrap}
[data-theme="dark"] .pill{color:#E4C9A8}
.empty{padding:34px 16px;text-align:center;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:8px}
.setup{background:#FDF6E7;border:1px solid #E8D9B5;color:#7A5C22;border-radius:14px;padding:12px 14px;font-size:13.5px;margin-bottom:16px}
[data-theme="dark"] .setup{background:#33290F;border-color:#5A4A1E;color:#E3CE96}
.roomgrid{max-height:340px;overflow-y:auto}

/* ================= LUXURY LAYER ================= */
.social-a{display:inline-flex;align-items:center;gap:7px}
.social-a .ic-s{vertical-align:0;color:var(--cacao)}
[data-theme="dark"] .social-a .ic-s{color:var(--bronze)}
.ic-s{display:inline-block;vertical-align:-4px;flex:none}
.mi{display:inline-flex;align-items:center;margin-inline-end:4px;opacity:.75}
.mi .ic-s{vertical-align:-2px}
.iconbtn{display:inline-flex;align-items:center;justify-content:center}
.hf .ic-s{fill:var(--accent,#B98A5C);stroke:var(--accent,#B98A5C)}
.nav{position:relative}
.nav::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,var(--bronze) 50%,transparent 95%);opacity:.65}
.nav button .ic{display:flex;justify-content:center}
.btn:not(.ghost):not(.warn){background:linear-gradient(135deg,var(--espresso),var(--cacao));
  box-shadow:0 10px 24px -8px rgba(62,42,30,.45)}
[data-theme="dark"] .btn:not(.ghost):not(.warn){background:linear-gradient(135deg,var(--bronze),#D9B47F);box-shadow:0 10px 24px -10px rgba(0,0,0,.6)}
.btn{transition:transform .16s ease,box-shadow .2s ease,opacity .2s}
.btn:active{transform:scale(.975)}
.card{transition:transform .18s ease,box-shadow .22s ease}
.card:active{transform:scale(.99)}
.fadein>*{animation:fade .45s ease both}
.fadein>*:nth-child(2){animation-delay:.05s}.fadein>*:nth-child(3){animation-delay:.1s}
.fadein>*:nth-child(4){animation-delay:.15s}.fadein>*:nth-child(5){animation-delay:.2s}
.fadein>*:nth-child(n+6){animation-delay:.24s}
.hero img{animation:kenburns 16s ease-in-out infinite alternate}
@keyframes kenburns{from{transform:scale(1)}to{transform:scale(1.07)}}
.hero .tag{border:1px solid rgba(255,255,255,.35);backdrop-filter:blur(6px)}
.empty .big{width:74px;height:74px;margin:0 auto 14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:var(--sand);
  color:var(--bronze);border:1px solid var(--line)}
.empty .big .ic-s{vertical-align:0}
[data-theme="dark"] .empty .big{background:rgba(255,255,255,.05)}
.rankb{width:27px;height:27px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:14.5px;flex:none;margin-inline-end:2px;
  background:var(--sand);color:var(--muted);border:1px solid var(--line)}
.rankb.r0{background:linear-gradient(135deg,#F5D98B,#C9992E);color:#3E2A1E;border:none;box-shadow:0 3px 10px -3px rgba(201,153,46,.6)}
.rankb.r1{background:linear-gradient(135deg,#E8E8EA,#B9BCC4);color:#3A3A40;border:none}
.rankb.r2{background:linear-gradient(135deg,#E3B08B,#B3703F);color:#3E2113;border:none}
.profcard{display:flex;align-items:center;gap:13px;padding:15px 16px}
.pf-ava{width:52px;height:52px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--espresso),var(--cacao));color:#F6ECDD;
  box-shadow:0 8px 18px -8px rgba(62,42,30,.55)}
[data-theme="dark"] .pf-ava{background:linear-gradient(135deg,var(--bronze),#D9B47F);color:#221708}
.profcard h4{font-size:19px}
.cred{margin-top:12px;border:1px dashed var(--bronze);border-radius:14px;padding:13px 15px;background:var(--sand)}
[data-theme="dark"] .cred{background:rgba(255,255,255,.04)}
.cred div{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0}
.cred span{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.cred b{font-family:var(--font-display);font-size:23px;color:var(--cacao);letter-spacing:.04em}
[data-theme="dark"] .cred b{color:var(--bronze)}
.chatbar button{display:flex;align-items:center;justify-content:center}
.quickrow button span{display:flex;justify-content:center;color:var(--cacao)}
[data-theme="dark"] .quickrow button span{color:var(--bronze)}
h3 .ic-s,h4 .ic-s{color:var(--bronze);vertical-align:-3px}
.modal h3 .ic-s{color:var(--bronze)}
@media (prefers-reduced-motion: reduce){.hero img,.fadein>*{animation:none}}


/* ================= LUXURY LAYER 2 — drawer, top bar, pages ================= */
.screen{padding:18px 18px 48px}
.chatbar{bottom:calc(10px + env(safe-area-inset-bottom))}
.thread{padding-bottom:88px}
.screen{animation:screenIn .32s ease}
@keyframes screenIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.top{margin-bottom:4px}
.whobar{margin:8px 0 18px}
.whobar h2{font-size:27px;line-height:1.15}
.whobar p{font-size:13px;color:var(--muted);margin-top:2px}
.toprow-l{display:flex;align-items:center;gap:9px;min-width:0}
.socialrow{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.socialrow::-webkit-scrollbar{display:none}
.socialtop{width:35px;height:35px;color:var(--cacao);text-decoration:none}
[data-theme="dark"] .socialtop{color:var(--bronze)}
/* drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(22,14,8,.45);backdrop-filter:blur(3px);z-index:80;opacity:0;transition:opacity .24s ease}
.drawer-bg.open{opacity:1}
.drawer{position:absolute;inset-block:0;inset-inline-start:0;width:min(320px,84vw);
  background:linear-gradient(168deg,var(--bg) 0%,var(--sand) 120%);
  display:flex;flex-direction:column;padding:26px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateX(-106%);transition:transform .27s cubic-bezier(.2,.75,.2,1);
  box-shadow:40px 0 90px -35px rgba(0,0,0,.55)}
[dir="rtl"] .drawer{transform:translateX(106%)}
.drawer-bg.open .drawer{transform:none}
[data-theme="dark"] .drawer{background:linear-gradient(168deg,#20180F 0%,#181209 120%)}
.dr-head{display:flex;gap:13px;align-items:center;margin-bottom:24px}
.dr-head .mono.sm{width:47px;height:47px;font-size:23px;border-radius:15px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--espresso),var(--cacao));color:#F2E3CB;
  box-shadow:0 10px 24px -10px rgba(62,42,30,.6)}
[data-theme="dark"] .dr-head .mono.sm{background:linear-gradient(135deg,var(--bronze),#D9B47F);color:#221708}
.dr-head h3{font-family:var(--font-display);font-size:21px;line-height:1.1}
.dr-head p{font-size:12.5px;color:var(--muted)}
.dr-items{flex:1;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.dr-it{display:flex;align-items:center;gap:13px;padding:13px;border-radius:14px;font-size:15.5px;
  color:var(--ink);text-align:start;background:transparent;transition:background .15s}
.dr-it:active{background:var(--sand)}
.dr-it.on{background:linear-gradient(135deg,var(--espresso),var(--cacao));color:#F6ECDD;box-shadow:0 10px 24px -12px rgba(62,42,30,.55)}
[data-theme="dark"] .dr-it.on{background:linear-gradient(135deg,var(--bronze),#D9B47F);color:#221708}
.dr-ic{display:flex;color:var(--cacao)}
[data-theme="dark"] .dr-ic{color:var(--bronze)}
.dr-it.on .dr-ic{color:inherit;opacity:.9}
.dr-it .badge{margin-inline-start:auto}
.dr-foot{display:flex;gap:10px;align-items:center;padding-top:16px;border-top:1px solid var(--line)}
.dr-out{margin-inline-start:auto;display:inline-flex;gap:8px;align-items:center;font-size:14px;
  color:var(--muted);padding:10px 15px;border:1px solid var(--line);border-radius:999px;background:var(--card)}
/* luxury login */
.login-wrap{background:radial-gradient(130% 95% at 50% -12%,#5C4030 0%,#3E2A1E 46%,#221610 100%)}
.login-card{background:rgba(255,251,244,.97);border-radius:26px;box-shadow:0 34px 90px -34px rgba(0,0,0,.65)}
.brandmark .mono{width:76px;height:76px;font-size:35px;border:1px solid rgba(217,180,127,.65);
  box-shadow:0 0 0 8px rgba(217,180,127,.13),0 22px 55px -20px rgba(0,0,0,.75)}
.brandmark h1{letter-spacing:.05em}
.brandmark p{letter-spacing:.14em;text-transform:uppercase;font-size:11.5px;opacity:.85}
/* social & reviews page */
.wa-cta{display:flex;gap:11px;align-items:center;justify-content:center;padding:16px;border-radius:17px;
  background:linear-gradient(135deg,var(--espresso),var(--cacao));color:#F6ECDD;text-decoration:none;
  font-size:16px;margin-bottom:20px;box-shadow:0 14px 30px -12px rgba(62,42,30,.55)}
[data-theme="dark"] .wa-cta{background:linear-gradient(135deg,var(--bronze),#D9B47F);color:#221708}
.social-big{display:flex;align-items:center;gap:13px;padding:15px 16px;text-decoration:none;color:var(--ink)}
.sb-ic{width:39px;height:39px;border-radius:13px;background:var(--sand);display:flex;align-items:center;
  justify-content:center;color:var(--cacao);border:1px solid var(--line);flex:none}
[data-theme="dark"] .sb-ic{color:var(--bronze);background:rgba(255,255,255,.05)}
.sb-ic.star{font-size:19px;color:var(--bronze)}
.sb-nm{font-size:16.5px;font-weight:600}
.sb-go{margin-inline-start:auto;color:var(--muted);transform:rotate(180deg)}
[dir="rtl"] .sb-go{transform:none}
/* team page */
.teamcount{display:flex;align-items:center;gap:15px;padding:16px 18px}
.teamcount b{font-size:36px;color:var(--cacao);line-height:1}
[data-theme="dark"] .teamcount b{color:var(--bronze)}
.teamcount span{font-size:14px;color:var(--muted)}
.team-card{display:flex;gap:14px;align-items:flex-start}
.tc-photo{width:88px;height:106px;border-radius:16px;overflow:hidden;flex:none;border:1px solid var(--line);background:var(--sand)}
.tc-photo img{width:100%;height:100%;object-fit:cover}
.tc-photo.sm{width:58px;height:70px;border-radius:13px}
.tc-mono{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--bronze);
  background:linear-gradient(150deg,var(--sand),var(--card))}
.tc-body{min-width:0;flex:1}
.tc-body h4{font-size:20px;line-height:1.15}
.tc-pos{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--bronze);margin:3px 0 4px}
.tc-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tchip{font-size:12px;padding:4.5px 11px;border-radius:999px;background:var(--sand);border:1px solid var(--line);color:var(--muted)}
.team-card .social-a{margin-top:6px}

</style>

async function sb(path, opts={}){
  const res = await fetch(CONFIG.SUPABASE_URL + "/rest/v1/" + path, {
    ...opts,
    headers:{
      "apikey":CONFIG.SUPABASE_ANON_KEY,
      "Authorization":"Bearer "+CONFIG.SUPABASE_ANON_KEY,
      "Content-Type":"application/json",
      "Prefer": opts.method==="POST"||opts.method==="PATCH" ? "return=representation" : "",
      ...(opts.headers||{})
    }
  });
  if(!res.ok) throw new Error("Supabase "+res.status+" on "+path);
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

function shade(hex,p){
  const n=parseInt(hex.slice(1),16); let r=n>>16,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r+(255-r)*p)); g=Math.min(255,Math.round(g+(255-g)*p)); b=Math.min(255,Math.round(b+(255-b)*p));
  return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");
}

function staffStats(username){
  const mine=S.tasks.filter(x=>x.assigned_to===username);
  const done=mine.filter(x=>x.status==="done"&&!x.was_still).length;
  const late=mine.filter(x=>x.status==="done"&&x.was_still).length;
  const cant=mine.filter(x=>x.status==="cant").length;
  const open=mine.filter(x=>["open","accepted","still"].includes(x.status)).length;
  return {done,late,cant,open,points:done*10+late*6};
}

function wireLogin(){
  document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
  document.querySelectorAll("[data-role]").forEach(b=>b.onclick=()=>{loginRole=b.dataset.role;render();});
  document.querySelectorAll("[data-gmode]").forEach(b=>b.onclick=()=>{guestMode=b.dataset.gmode;render();});
  const tl=$("#btn-teamlink"); if(tl) tl.onclick=()=>{loginMode="team";render();};
  const gl=$("#btn-guestlink"); if(gl) gl.onclick=()=>{loginMode="guest";render();};
  $("#btn-login").onclick=async ()=>{
    const err=$("#login-err");
    if(loginMode==="guest"){
      const room=$("#f-room").value.trim();
      if(!room){ err.textContent=t("loginErr"); return; }
      if(guestMode==="signin"){
        const existing=S.accounts.find(a=>String(a.room)===room || String(a.username||"")===room);
        if(!existing){ err.textContent=t("roomNotFound"); return; }
        const rm=S.rooms.find(x=>String(x.room)===String(existing.room));
        if(!rm || !rm.active){ err.textContent=t("roomNotFound"); return; }
        const p=$("#f-gpass").value;
        if(existing.password && existing.password!==p){ err.textContent=t("loginErr"); return; }
        startGuestSession(existing);
      } else {
        const rm=S.rooms.find(x=>String(x.room)===room);
        if(!rm || !rm.active){ err.textContent=t("roomNotFound"); return; }
        const existing=S.accounts.find(a=>String(a.room)===room);
        if(existing){ err.textContent=t("accountExists"); guestMode="signin"; setTimeout(render,1400); return; }
        const name=$("#f-name").value.trim(), phone=$("#f-phone").value.trim();
        const nat=$("#f-nat").value.trim(), arr=$("#f-arr").value, dep=$("#f-dep").value;
        if(!name||!nat||!arr||!dep||Date.parse(dep)<Date.parse(arr)){ err.textContent=t("loginErr"); return; }
        let acc;
        try{ acc=await DB.addAccount({room,name,phone,nationality:nat,arrival:arr,departure:dep,username:room,password:genPass()}); }
        catch(e){ err.textContent=t("loginErr"); return; }
        startGuestSession(acc);
        openCredentialsModal(acc);
      }
    } else {
      const u=$("#f-user").value.trim(), p=$("#f-pass").value;
      const found=S.users.find(x=>x.username===u && x.password===p && (loginRole==="manager"?x.role==="manager":true));
      if(!found){ err.textContent=t("loginErr"); return; }
      const role = found.role==="manager" && loginRole==="manager" ? "manager" : "staff";
      S.session={role,name:found.display_name||found.username,username:found.username,userId:found.id};
      S.tab = role==="manager" ? "dash" : "today"; persist(); render();
    }
  };
}

function activityCard(a,{showBook=true,showFav=true,manager=false,staff=false}={}){
  const unlimited=!(+a.capacity);
  const taken=seatsTaken(a.id), left=Math.max(0,a.capacity-taken), full=!unlimited&&left<=0;
  const mine=myBooking(a.id);
  const fav=S.favorites.includes(a.id);
  let side="";
  if(manager){
    side=`<button class="btn sm ghost" data-edit="${a.id}">${ic("pen",15)}</button><span class="seats">${taken}/${a.capacity}</span>`;
  } else if(staff){
    side=`${canSeeGuests(a)?`<button class="btn sm ghost" data-att="${a.id}">${ic("check",15)}</button>`:""}<span class="pill">${bookingsFor(a.id).length} ${t("guests")}</span>`;

    side = mine

      : full ? `<span class="chip full">${t("full")}</span>` : `<button class="btn sm" data-book="${a.id}">${t("book")}</button>`;
    side += `<span class="seats">${unlimited||full?"":left+" "+t("seatsLeft")}</span>`;

  const links=[["Instagram",st.instagram],["TikTok",st.tiktok],["Facebook",st.facebook],["YouTube",st.youtube]].filter(x=>x[1]);
  if(!links.length) return "";
  return `<div class="sec card" style="padding:18px">
    <h3 style="font-size:22px">${t("followUs")}</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      ${links.map(([n,u])=>`<a class="btn sm ghost social-a" style="text-decoration:none" href="${esc(u)}" target="_blank" rel="noopener">${brandIc(n)} ${n}</a>`).join("")}
    </div></div>`;
}

/* ---------------- staff ---------------- */
function staffView(){
  const todayIdx=(new Date().getDay()+6)%7;
  if(S.tab==="today"){
    const acts=S.activities.filter(a=>a.day===todayIdx);
    const hl=acts.find(a=>a.highlight);
    return `<div class="screen fadein">
      ${topBar(t("schedule"),t("days")[todayIdx]+" · "+S.session.name)}
      ${heroCard(hl)}
      ${listByCat(acts.filter(a=>a!==hl),{staff:true,showBook:false,showFav:false})}
    </div>`;
  }
  if(S.tab==="week") return weeklyView(t("week"));
  if(S.tab==="tasks"){
    const me=S.session.username;
    const mine=S.tasks.filter(x=>!x.assigned_to || x.assigned_to===me);
    const rk=rankingRows();
    return `<div class="screen fadein">
      ${topBar(t("myTasks"),S.session.name)}
      ${rk.length?`<div class="sec"><h3>${ic("trophy",18)} ${t("rank")}</h3><div class="card">
        ${rk.map((r,i)=>`<div class="booking-line"><span>${rankBadge(i)} ${esc(r.u.display_name||r.u.username)}${r.u.username===me?" ✦":""}</span><span class="pill">${r.points} ${t("points")}</span></div>`).join("")}
      </div></div>`:""}
      ${mine.length?`<div class="card">${mine.map(x=>taskLine(x,false)).join("")}</div>`:`<div class="empty"><div class="big">${ic("check",30)}</div>${t("noTasks")}</div>`}
    </div>`;
  }
  if(S.tab==="feedback") return staffFeedbackView();
  return bookingsView(t("guestsBooked"));
}
function taskStatusChip(x,clickAttr){
  const map={open:[t("statusNew"),"res"],accepted:[t("accepted"),"res"],still:[t("still"),"res"],done:[x.was_still?t("done")+" · "+t("late"):t("done"),"ok"],cant:[t("cantDo"),"full"]};
  const [lb,cls]=map[x.status]||map.open;
  return `<${clickAttr?"button":"span"} class="chip ${cls}" ${clickAttr?clickAttr+'="'+x.id+'"':""}>${lb}</${clickAttr?"button":"span"}>`;
}
function taskLine(x,managerMode){
  const u=S.users.find(u=>u.username===x.assigned_to);
  const assignee = x.assigned_to ? ((u&&u.display_name)||x.assigned_to) : t("allTeam");
  const due=x.due?String(x.due).replace("T"," "):"";
  const info=`<span style="min-width:0">${ic(TASK_ICON[x.type]||"check",15)} <b>${esc(x.title)}</b>
    <br><span class="mini">${taskTypeLabel(x.type)}${x.location?` · ${mi("pin")}${esc(x.location)}`:""}</span>
    ${x.desc?`<br><span class="mini">${esc(x.desc)}</span>`:""}
    ${due?`<br><span class="mini">${mi("clock")}${esc(due)}</span>`:""}
    ${managerMode?`<br><span class="mini">${mi("user")}${esc(assignee)}</span>`:""}</span>`;
  if(managerMode){
    return `<div class="booking-line">${info}
      <span style="display:flex;gap:6px;align-items:center;flex:none">
        ${taskStatusChip(x,"data-taskdone")}
        <button class="btn sm warn" data-taskdel="${x.id}">✕</button>
      </span></div>`;
  }
  let actions="";
  if(x.status==="open") actions=`<button class="btn sm" data-taccept="${x.id}">${t("accept")}</button>`;
  else if(x.status==="accepted"||x.status==="still"){
    actions=`<button class="btn sm" data-tsdone="${x.id}">${t("done")}</button>
      ${x.status==="accepted"?`<button class="btn sm ghost" data-tstill="${x.id}">${t("still")}</button>`:""}
      <button class="btn sm warn" data-tcant="${x.id}">${t("cantDo")}</button>`;
  } else actions=taskStatusChip(x,null);
  return `<div class="booking-line">${info}
    <span style="display:flex;gap:6px;align-items:center;flex:none;flex-wrap:wrap;justify-content:flex-end;max-width:46%">${actions}</span></div>`;
}

function chatInboxInner(){
  const rooms={};
  S.messages.forEach(m=>{ (rooms[m.room]=rooms[m.room]||[]).push(m); });
  const list=Object.entries(rooms).map(([room,ms])=>({room,last:ms[ms.length-1],
    unread:ms.filter(m=>m.sender==="guest"&&!m.read_by_team).length}))
    .sort((a,b)=>new Date(b.last.created_at)-new Date(a.last.created_at));
  return `<div class="chatlist">
      ${list.length?list.map(c=>`<div class="card" data-chatroom="${esc(c.room)}">
        <div style="min-width:0">
          <div class="nm">${esc(accountName(c.room))} <span class="mini">· ${t("room")} ${esc(c.room)}</span></div>
          <div class="lastm">${esc(c.last.text)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none">
          <span class="mini">${fmtTime(c.last.created_at)}</span>
          ${c.unread?`<span class="badge">${c.unread}</span>`:""}
        </div>
      </div>`).join(""):`<div class="empty"><div class="big">${ic("chat",34)}</div>${t("noMessages")}</div>`}
    </div>`;
}

function bookingsInner(){
  const isMgr=S.session.role==="manager";
  const acts=S.activities.filter(a=>a.day===S.day);
  return dayTabs() + (acts.length?acts.sort((x,y)=>String(x.time).localeCompare(String(y.time))).map(a=>{
    const bks=bookingsFor(a.id);
    const visible=canSeeGuests(a);
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:${visible&&bks.length?8:0}px;gap:8px">

        <span class="pill">${a.capacity>0?seatsTaken(a.id)+"/"+a.capacity:bks.length+" "+t("guests")}</span></div>
      ${visible?bks.map(b=>`<div class="booking-line">
        <span><b>${t("room")} ${esc(b.room)}</b> · ${esc(b.guest_name)}${isMgr&&b.nationality?` · ${esc(b.nationality)}`:""}</span>
        <span class="pill">${b.adults}A${b.children?(" +"+b.children+"C"):""}${b.status==="waitlist"?" · …":""}</span></div>`).join(""):""}
    </div>`;}).join(""):`<div class="empty"><div class="big">${ic("pin",30)}</div>${t("noneToday")}</div>`);

/* ---------------- manager (full access — manager role only) ---------------- */
function managerView(){
  if(S.tab==="dash") return dashView();
  if(S.tab==="program"){
    const inner = S.sub.program==="tickets" ? managerTicketsInner() : managerActsInner();
    return `<div class="screen fadein">
      ${topBar(t("manage"),S.session.name)}
      ${subTabs("program",[["acts",t("activities")],["tickets",t("tickets")]])}
      ${inner}
    </div>`;
  }
  if(S.tab==="guests"){
    const sub=S.sub.guests;
    if(sub==="chat" && S.chatRoom) return chatThreadScreen();
    let inner="";
    if(sub==="bookings") inner=bookingsInner();
    else if(sub==="chat") inner=chatInboxInner();
    else if(sub==="feedback") inner=feedbackInner();
    else inner=requestsInner();
    return `<div class="screen fadein">
      ${topBar(t("guestsTab"),S.session.name)}
      ${subTabs("guests",[["bookings",t("bookings")],["chat",t("chat")],["requests",t("requests")],["feedback",t("feedback")]])}
      ${inner}
    </div>`;
  }
  if(S.tab==="team"){
    const sub=S.sub.team;
    const inner = sub==="tasks" ? tasksInner() : sub==="attendance" ? attendanceInner() : sub==="profiles" ? profilesInner() : accountsInner();
    return `<div class="screen fadein">
      ${topBar(t("teamTab"),S.session.name)}
      ${subTabs("team",[["accounts",t("teamAccounts")],["profiles",t("profiles")],["tasks",t("tasks")],["attendance",t("attendance")]])}
      ${inner}
    </div>`;
  }
  if(S.tab==="ai") return aiView();
  return appSettingsView();
}

  return `<div class="stat-grid" style="grid-template-columns:1fr 1fr">
      <div class="stat"><b>${avg} ★</b><span>${t("avgRate")}</span></div>
      <div class="stat"><b>${S.feedback.length}</b><span>${t("feedback")}</span></div>
    </div>`
  + (S.feedback.length?`<div class="card">${S.feedback.map(f=>`<div class="booking-line">

function dashView(){
  if(S.sub.dash==="rooms"){
    return `<div class="screen fadein">
      ${topBar(t("dashboard"),S.session.name)}
      ${subTabs("dash",[["overview",t("overview")],["rooms",t("rooms")]])}
      ${roomsInner()}
    </div>`;
  }
  const totalB=S.bookings.length;
  const wait=S.bookings.filter(b=>b.status==="waitlist").length;
  const withCap=S.activities.filter(a=>a.capacity>0);
  const occ=withCap.length?Math.round(withCap.reduce((n,a)=>n+Math.min(1,seatsTaken(a.id)/a.capacity),0)/withCap.length*100):0;
  const tSold=S.orders.reduce((n,o)=>n+(+o.qty||0),0);
  const rooms=new Set(S.bookings.map(b=>b.room)).size;
  const people=S.bookings.filter(b=>b.status==="booked").reduce((n,b)=>n+(+b.adults||0)+(+b.children||0),0);
  const natMap={};
  S.bookings.forEach(b=>{ if(b.nationality){ (natMap[b.nationality]=natMap[b.nationality]||new Set()).add(b.room); } });
  S.orders.forEach(o=>{ if(o.nationality){ (natMap[o.nationality]=natMap[o.nationality]||new Set()).add(o.room); } });
  const nats=Object.entries(natMap).map(([n,s])=>[n,s.size]).sort((x,y)=>y[1]-x[1]);
  const top=[...S.activities].map(a=>({a,n:seatsTaken(a.id)})).sort((x,y)=>y.n-x.n).slice(0,5).filter(x=>x.n>0);
  return `<div class="screen fadein">
    ${topBar(t("dashboard"),S.session.name)}
    ${subTabs("dash",[["overview",t("overview")],["rooms",t("rooms")]])}
    ${!REMOTE?`<div class="setup">${t("demoNote")}</div>`:""}
    <div class="stat-grid">
      <div class="stat"><b>${totalB}</b><span>${t("totalBookings")}</span></div>
      <div class="stat"><b>${occ}%</b><span>${t("occupancy")}</span></div>
      <div class="stat"><b>${tSold}</b><span>${t("tickets")}</span></div>
      <div class="stat"><b>${wait}</b><span>${t("waitlisted")}</span></div>
      <div class="stat"><b>${rooms}</b><span>${t("uniqueGuests")}</span></div>
      <div class="stat"><b>${people}</b><span>${t("totalPeople")}</span></div>
    </div>
    ${nats.length?`<div class="sec"><h3>${t("natStats")}</h3><div class="card">
      ${nats.map(([n,c])=>`<div class="booking-line"><span>${esc(n)}</span><span class="pill">${c}</span></div>`).join("")}
    </div></div>`:""}
    <div class="sec"><h3>${ic("star",18)} ${t("activities")}</h3>
      ${top.length?top.map(x=>`<div class="card booking-line" style="padding:12px 14px">
        <span><b>${esc(x.a.name)}</b> · ${t("daysShort")[x.a.day]} ${x.a.time}</span>
        <span class="pill">${x.n} ${t("guests")}</span></div>`).join(""):`<div class="empty"><div class="big">${ic("grid",30)}</div>${t("none")}</div>`}
    </div>
  </div>`;
}

function openProfileModal(p){
  const isNew=!p; p=p||{name:"",position:"",photo:"",nationality:"",languages:"",skills:"",instagram:""};
  const wrap=baseModal(`
    <h3>${ic("pen",20)} ${isNew?t("addProfile"):t("profiles")}</h3>
    <label>${t("name")}</label><input id="pr-name" value="${esc(p.name)}">
    <label>${t("positionLbl")}</label><input id="pr-pos" value="${esc(p.position)}" placeholder="Entertainment Manager / Entertainer">
    <label>${t("imageUrl")}</label><input id="pr-photo" value="${esc(p.photo)}" placeholder="https://...">
    <label>${t("nationality")}</label>
    <input id="pr-nat" list="prnatlist" value="${esc(p.nationality)}">
    <datalist id="prnatlist">${NATIONS.map(n=>`<option value="${n}">`).join("")}</datalist>
    <label>${t("languagesLbl")}</label><input id="pr-lang" value="${esc(p.languages)}" placeholder="DE · EN · RU">
    <label>${t("skills")}</label><input id="pr-skills" value="${esc(p.skills)}" placeholder="Dance · Shows · Kids">
    <label>${t("instagramLbl")}</label><input id="pr-ig" value="${esc(p.instagram)}" placeholder="https://instagram.com/...">
    <button class="btn" id="pr-go">${t("save")}</button>
    <button class="btn ghost" id="pr-x">${t("close")}</button>`);
  wrap.querySelector("#pr-x").onclick=()=>wrap.remove();
  wrap.querySelector("#pr-go").onclick=async ()=>{
    const name=wrap.querySelector("#pr-name").value.trim();
    if(!name) return;
    await DB.saveProfile({...p,name,
      position:wrap.querySelector("#pr-pos").value.trim(),
      photo:wrap.querySelector("#pr-photo").value.trim(),
      nationality:wrap.querySelector("#pr-nat").value.trim(),
      languages:wrap.querySelector("#pr-lang").value.trim(),
      skills:wrap.querySelector("#pr-skills").value.trim(),
      instagram:wrap.querySelector("#pr-ig").value.trim()});
    wrap.remove(); toast(t("saved")); render();
  };
}

async function askAI(text){
  const key=localStorage.getItem("ent_ai_key");

  S.aiBusy=true; render();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":key,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,
        system:"You are the professional AI assistant inside a hotel entertainment manager app in Hurghada. Help the entertainment manager plan programs, write announcements and messages, solve team and guest problems, and improve quality. Be concise and practical. Always reply in the same language the manager writes in. Live data: "+aiContext(),
        messages:S.aiChat.map(m=>({role:m.role,content:m.content}))})
    });
    if(!res.ok) throw new Error("AI "+res.status);

    S.aiChat.push({role:"assistant",content:reply||"…"});

function downloadBlob(name,blob){
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name;

}
async function exportReport(){
  const weekAgo=Date.now()-7*864e5;
  const weekTasks=S.tasks.filter(x=>!x.created_at||Date.parse(x.created_at)>=weekAgo);
  const rank=rankingRows().map((r,i)=>[i+1,r.u.display_name||r.u.username,r.done,r.late,r.cant,r.open,r.points]);
  const taskRows=weekTasks.map(x=>[String(x.created_at||"").slice(0,16).replace("T"," "),taskTypeLabel(x.type),x.title,
    x.assigned_to?((S.users.find(u=>u.username===x.assigned_to)||{}).display_name||x.assigned_to):t("allTeam"),
    x.location||"",String(x.due||"").replace("T"," "),
    x.status==="done"?(x.was_still?t("done")+" ("+t("late")+")":t("done")):x.status==="cant"?t("cantDo"):x.status==="still"?t("still"):x.status==="accepted"?t("accepted"):t("statusNew")]);
  const fbRows=S.feedback.filter(f=>!f.created_at||Date.parse(f.created_at)>=weekAgo)
    .map(f=>[String(f.created_at||"").slice(0,16).replace("T"," "),f.room,f.nationality||"",f.rate,f.comment||"",f.by_user||""]);
  const fname="entertainment-report-"+todayISO();
  const ok=await loadXLSX();
  if(ok){
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["#",t("displayName"),t("done"),t("late"),t("cantDo"),t("statusNew"),t("points")],...rank]),"Ranking");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Date",t("taskType"),t("actName"),t("taskFor"),t("location"),t("dueLbl"),"Status"],...taskRows]),"Tasks");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Date",t("room"),t("nationality"),t("rate"),t("comment"),t("user")],...fbRows]),"Feedback");
    XLSX.writeFile(wb,fname+".xlsx");
  } else {
    const csv=[["RANKING"],["#",t("displayName"),t("done"),t("late"),t("cantDo"),t("statusNew"),t("points")],...rank,[],
      ["TASKS"],["Date",t("taskType"),t("actName"),t("taskFor"),t("location"),t("dueLbl"),"Status"],...taskRows,[],
      ["FEEDBACK"],["Date",t("room"),t("nationality"),t("rate"),t("comment"),t("user")],...fbRows]
      .map(r=>r.map(c=>'"'+String(c??"").replace(/"/g,'""')+'"').join(";")).join("\n");
    downloadBlob(fname+".csv",new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));
  }
  toast(t("saved"));
}

/* ---------------- boot ---------------- */
function safeToRender(){
  if(document.querySelector(".modal-bg")) return false;
  const a=document.activeElement;
  return !(a && ["INPUT","TEXTAREA","SELECT"].includes(a.tagName));
}
function startRealtime(){
  if(!REMOTE || window.__rt) return;
  window.__rt=true;
  const sc=document.createElement("script");
  sc.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
  sc.onload=()=>{ try{
    const client=window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    let tmr=null;
    client.channel("live-changes")
      .on("postgres_changes",{event:"*",schema:"public"},()=>{
        clearTimeout(tmr);
        tmr=setTimeout(async ()=>{
          try{ const changed=await DB.poll(); if(changed && S.session && safeToRender()) render(); }catch(e){}
        },300);
      })
      .subscribe();
  }catch(e){ console.warn("realtime unavailable",e); } };
  sc.onerror=()=>console.warn("realtime script blocked — polling continues");
  document.head.appendChild(sc);
}

    S.users=DEMO_USERS.map(u=>({...u})); S.tickets=demoTickets(); S.orders=demoOrders();
    S.rooms=demoRooms(); S.accounts=demoAccounts(); S.messages=demoMessages();
    S.requests=demoRequests(); S.tasks=demoTasks(); S.notes=demoNotes(); S.attendance=[]; S.feedback=demoFeedback(); S.profiles=demoProfiles();
  }
  /* validate remembered session against fresh data */
  if(S.session){
    if(S.session.role==="guest"){
      const rm=S.rooms.find(x=>String(x.room)===String(S.session.room));
      const acc=S.accounts.find(a=>String(a.room)===String(S.session.room));
      if(!rm || !rm.active || !acc) S.session=null;
      else S.session={role:"guest",room:acc.room,name:acc.name,phone:acc.phone||"",
        nationality:acc.nationality||"",arrival:acc.arrival,departure:acc.departure,
        accountId:acc.id,username:acc.username||acc.room};
    } else {
      const u=S.users.find(x=>x.username===S.session.username);
      if(!u || (S.session.role==="manager" && u.role!=="manager")) S.session=null;
      else S.session={...S.session,name:u.display_name||u.username,userId:u.id};
    }
    if(!S.session){ S.tab="home"; }
    persist();
  }
  applySettings();
  render();
  startRealtime();
  if(REMOTE) setInterval(async ()=>{
    if(!S.session) return;
    try{ const changed=await DB.poll(); if(changed && safeToRender()) render(); }catch(e){}
  }, 45000);
})();
</script>
</body>
</html>
